# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy ASP.Net Core app to Azure Web App - Mission12Farley
on:
  push:
    branches:
      - Mission13
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ── Build React Frontend ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: bookstore-frontend
        run: npm install

      - name: Build frontend
        working-directory: bookstore-frontend
        run: npm run build

      # Copy the React build output into the API's wwwroot folder
      # so the .NET app can serve it as static files
      - name: Copy frontend to API wwwroot
        run: |
          mkdir -p BookstoreAPI/wwwroot
          cp -r bookstore-frontend/dist/* BookstoreAPI/wwwroot/
        shell: bash

      # ── Build .NET Backend ──
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release
        working-directory: BookstoreAPI

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"
        working-directory: BookstoreAPI

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Mission12Farley'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_990FDFC7BE474A379ECF3D5ADB5EDF2A }}
